<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep slate / dark blue-grey -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Tag Body Gradient: Sleek Argentina Sky Blue -->
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Premium Gold Gradient for Percent Symbol and Accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="30%" stop-color="#f59e0b" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- Drop Shadow for the Tag -->
    <filter id="dropShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Inner border ring (subtle teal) -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#0ea5e9" stroke-width="4" opacity="0.15" />

  <!-- Premium Golden Sparkles in Background -->
  <!-- Top-Right Sparkle -->
  <path d="M 380,90 Q 400,90 400,70 Q 400,90 420,90 Q 400,90 400,110 Q 400,90 380,90 Z" fill="url(#goldGrad)" />
  <!-- Small Bottom-Left Sparkle -->
  <path d="M 90,400 Q 105,400 105,385 Q 105,400 120,400 Q 105,400 105,415 Q 105,400 90,400 Z" fill="url(#goldGrad)" opacity="0.8" />

  <!-- Interactive/Dynamic Tilting Tag -->
  <g transform="translate(256, 260) rotate(-15) translate(-256, -260)" filter="url(#dropShadow)">
    
    <!-- Tag Main Shape -->
    <path d="M 180,120 L 300,120 L 360,180 L 360,380 C 360,402 342,420 320,420 L 192,420 C 170,420 152,402 152,380 L 152,148 C 152,132 164,120 180,120 Z" fill="url(#tagGrad)" />
    
    <!-- Tag Inner Border Highlight -->
    <path d="M 182,125 L 298,125 L 355,182 L 355,378 C 355,397 339,413 320,413 L 192,413 C 173,413 157,397 157,378 L 157,151 C 157,137 168,125 182,125 Z" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.25" />

    <!-- Tag String Hole -->
    <circle cx="256" cy="165" r="16" fill="#0f172a" />
    <circle cx="256" cy="165" r="22" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3" />

    <!-- Gold Percentage Symbol inside the Tag -->
    <g transform="translate(186, 210)">
      <!-- Top-Left Circle of % -->
      <circle cx="36" cy="36" r="20" fill="none" stroke="url(#goldGrad)" stroke-width="10" />
      <circle cx="36" cy="36" r="6" fill="url(#goldGrad)" />
      
      <!-- Center Slash of % -->
      <line x1="104" y1="12" x2="36" y2="108" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" />
      
      <!-- Bottom-Right Circle of % -->
      <circle cx="104" cy="84" r="20" fill="none" stroke="url(#goldGrad)" stroke-width="10" />
      <circle cx="104" cy="84" r="6" fill="url(#goldGrad)" />
    </g>

    <!-- Subtle White Glow on Percentage Symbol for legibility -->
    <g transform="translate(186, 210)" opacity="0.1">
      <circle cx="36" cy="36" r="20" fill="none" stroke="#ffffff" stroke-width="2" />
      <line x1="104" y1="12" x2="36" y2="108" stroke="#ffffff" stroke-width="2" />
      <circle cx="104" cy="84" r="20" fill="none" stroke="#ffffff" stroke-width="2" />
    </g>
  </g>
</svg>
