name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/**'
      - 'web/**'
  workflow_run:
    workflows: ["Daily Scrape"]
    types:
      - completed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run == null || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy data to web static and src
        run: |
          mkdir -p web/static/data
          cp data/unified.json web/static/data/unified.json
          mkdir -p web/src/lib/data
          cp data/unified.json web/src/lib/data/unified.json

      - name: Build SvelteKit
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/build

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
